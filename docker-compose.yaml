# version: '3.8'

networks:
  application:
    driver: bridge

services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile   # 👈 Updated path
    container_name: melvic-app
    volumes:
      - .:/var/www/html
    depends_on:
      - mysql
    networks:
      - application

  nginx:
    image: nginx:latest
    container_name: melvic-nginx
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - application

  mysql:
    image: mysql:5.7
    container_name: melvic-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: laravell
      MYSQL_USER: laravell
      MYSQL_PASSWORD: secret
    ports:
      - "3304:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - application

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: melvic-phpmyadmin
    restart: always
    ports:
      - "8081:80"
    environment:
      PMA_HOST: melvic-mysql
      PMA_PORT: 3306
      PMA_USER: laravell
      PMA_PASSWORD: secret
    depends_on:
      - mysql
    networks:
      - application

  node:
    image: node:20-alpine
    container_name: melvic-node
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    depends_on:
      - app
    networks:
      - application

volumes:
  mysql-data:
